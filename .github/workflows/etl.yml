name: Fleet IIoT ETL Pipeline

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *' 

jobs:
  process-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Fleet Aggregation Script
        run: python iot_data_pipeline.py

      - name: Commit and Push Parquet File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add fleet_iiot_metrics.parquet
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update Fleet OEE Metrics"
            git pull --rebase origin main
            git push
          fi
